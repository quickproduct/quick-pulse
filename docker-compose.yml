# ============================================================================
# QuickPulse - Consolidated Docker Compose
# ============================================================================
# This single file manages the entire QuickPulse stack.
# Usage:
#   Start:          docker compose up -d
#   Stop:           docker compose down
#   View Logs:      docker compose logs -f
#
# Configuration is managed via the .env file in the root.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: ${CONTAINER_PREFIX}-backend
    user: root
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${CONTAINER_PREFIX}-db:5432/${DB_NAME}
      - REDIS_URL=redis://${CONTAINER_PREFIX}-redis:6379/0
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH}
      - LOG_DIR=${LOG_DIR}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION}
      - K8S_SERVER_OVERRIDE=${K8S_SERVER_OVERRIDE}
      - KUBECONFIG=${KUBECONFIG}
      - PYTHONPATH=/app:/home/appuser/.local/lib/python3.12/site-packages
      - DEBUG=${DEBUG:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.kube/config:/root/.kube/config:ro
      - ./backend:/app:delegated # Source code mount for hot-reload in dev
      - ./logs:/app/logs
    ports:
      - "${EXTERNAL_BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quickpulse-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '${BACKEND_CPUS:-1}'
          memory: ${BACKEND_MEMORY:-512m}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: ${CONTAINER_PREFIX}-frontend
    restart: unless-stopped
    ports:
      - "${EXTERNAL_FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quickpulse-network
    deploy:
      resources:
        limits:
          cpus: '${FRONTEND_CPUS:-0.5}'
          memory: ${FRONTEND_MEMORY:-256m}

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: ${CONTAINER_PREFIX}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - qp-data:/var/lib/postgresql/data
    ports:
      - "${EXTERNAL_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quickpulse-network
    deploy:
      resources:
        limits:
          cpus: '${DB_CPUS:-1}'
          memory: ${DB_MEMORY:-512m}

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX}-redis
    restart: unless-stopped
    command: redis-server --maxmemory ${REDIS_MAX_MEMORY:-64mb} --maxmemory-policy noeviction
    volumes:
      - qp-redis:/data
    ports:
      - "${EXTERNAL_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quickpulse-network
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPUS:-0.5}'
          memory: ${REDIS_MEMORY:-128m}

networks:
  quickpulse-network:
    name: ${CONTAINER_PREFIX}-network
    driver: bridge

volumes:
  qp-data:
    name: ${CONTAINER_PREFIX}-pgdata
  qp-redis:
    name: ${CONTAINER_PREFIX}-redisdata
