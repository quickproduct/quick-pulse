# ============================================================================
# QuickPulse - Consolidated Docker Compose (Go backend + SQLite)
# ============================================================================
# This single file manages the entire QuickPulse stack.
# Usage:
#   Start:          docker compose up -d
#   Stop:           docker compose down
#   View Logs:      docker compose logs -f
#
# Configuration is managed via the .env file in the root.

services:
  quickpulse:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: ${CONTAINER_PREFIX:-qp}-app
    user: root
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=${LOG_DIR:-/app/logs}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL:-admin@quickpulse.local}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - SQLITE_DB_PATH=/app/data/quickpulse.db
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      - K8S_SERVER_OVERRIDE=${K8S_SERVER_OVERRIDE}
      - KUBECONFIG=${KUBECONFIG}
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ~/.kube/config:/root/.kube/config:ro
      - qp-data:/app/data
      - ./logs:/app/logs
    ports:
      - "${EXTERNAL_FRONTEND_PORT:-8082}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  qp-data:
    name: ${CONTAINER_PREFIX:-qp}-data
