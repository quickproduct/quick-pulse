name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      # main.go embeds the SPA via `//go:embed all:frontend/build`, which is
      # produced by the frontend build (see Dockerfile) and not committed.
      # vet/test only need the path to exist, so stub it instead of pulling
      # Node into this job.
      - name: Stub embedded frontend build
        run: |
          mkdir -p backend/frontend/build
          echo '<!doctype html><title>stub</title>' > backend/frontend/build/index.html

      - name: Run Go Vet
        run: |
          cd backend
          go vet ./...

      - name: Run Backend Unit Tests
        run: |
          cd backend
          go test -v ./...

  frontend-test:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run TypeScript & Svelte Check
        run: |
          cd frontend
          npm run check
